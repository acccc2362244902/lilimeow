  <!-- 耳朵 -->
  <polygon points="180,160 195,100 220,145" fill="#3d3027"/>
  <polygon points="190,150 198,115 215,142" fill="#e8b4b4"/>
  <polygon points="332,160 317,100 292,145" fill="#3d3027"/>
