  <circle cx="256" cy="168" r="8" fill="#5c4a3a"/>
  <!-- 尾巴 -->
  <path d="M370,350 Q420,330 430,280 Q435,260 420,250" fill="none" stroke="#3d3027" stroke-width="16" stroke-linecap="round"/>
