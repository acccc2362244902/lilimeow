  <path d="M248,228 Q256,236 264,228" fill="none" stroke="#5c4a3a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 胡须 -->
  <line x1="140" y1="215" x2="205" y2="218" stroke="#3d3027" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="142" y1="228" x2="207" y2="226" stroke="#3d3027" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="372" y1="215" x2="307" y2="218" stroke="#3d3027" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="370" y1="228" x2="305" y2="226" stroke="#3d3027" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- 额头花纹 -->
