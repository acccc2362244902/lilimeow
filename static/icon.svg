  <ellipse cx="232" cy="207" rx="10" ry="12" fill="#5c8a3a"/>
  <ellipse cx="280" cy="207" rx="10" ry="12" fill="#5c8a3a"/>
  <ellipse cx="234" cy="204" rx="5" ry="6" fill="#111"/>
  <ellipse cx="278" cy="204" rx="5" ry="6" fill="#111"/>
